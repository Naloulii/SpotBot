<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotBot Dashboard 🎵</title>
    <!-- Intégration de Tailwind CSS pour un design sombre et moderne ultra propre -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
        .spotify-green { color: #1ed760; }
        .bg-card { background-color: #111827; }
    </style>
</head>
<body class="p-6 md:p-12 font-sans">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">SpotBot <span class="spotify-green">Dashboard</span> 🤖</h1>
                <p class="text-gray-400 mt-1 text-sm">Visualisation locale des données de ton bot Discord.</p>
            </div>
            <button onclick="chargerToutesLesDonnees()" class="bg-[#1ed760] hover:bg-[#1db954] text-black font-bold px-5 py-2.5 rounded-full transition shadow-lg text-sm flex items-center gap-2">
                🔄 Actualiser les données
            </button>
        </div>

        <!-- Section Statut / Chargement -->
        <div id="status-message" class="hidden mb-6 p-4 rounded-lg bg-blue-950 border border-blue-800 text-blue-300 text-sm">
            Connexion à GitHub en cours...
        </div>

        <!-- Grille principale -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- COLOUME 1 : TOP AUDITEURS -->
            <div class="bg-card rounded-2xl p-6 border border-gray-800 shadow-xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 border-b border-gray-800 pb-3">
                    🏆 Top Auditeurs
                </h2>
                <div id="top-auditeurs-list" class="space-y-3">
                    <p class="text-gray-500 text-sm italic">Aucune donnée chargée.</p>
                </div>
            </div>

            <!-- COLONNE 2 : DERNIÈRES ÉCOUTES -->
            <div class="bg-card rounded-2xl p-6 border border-gray-800 shadow-xl lg:col-span-2">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 border-b border-gray-800 pb-3">
                    🕒 Activité Récente (Historique)
                </h2>
                <div id="historique-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    <p class="text-gray-500 text-sm italic">Aucune donnée chargée.</p>
                </div>
            </div>

        </div>

        <!-- SECTION DU BAS : LIKES PAR MEMBRE -->
        <div class="bg-card rounded-2xl p-6 border border-gray-800 shadow-xl mt-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 border-b border-gray-800 pb-3">
                ❤️ Titres Favoris par Membre
            </h2>
            <div id="likes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-500 text-sm italic col-span-full">Aucune donnée chargée.</p>
            </div>
        </div>
    </div>

    <!-- ==========================================
                    LOGIQUE JAVASCRIPT
         ========================================== -->
    <script>
        // CONFIGURATION À REMPLIR EN LOCAL
        const GITHUB_TOKEN = "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"; 
        const USERNAME = "Naloulii";
        const REPO_NAME = "SpotBot";
        
        // Comme le bot écrit dans le dossier /data, le chemin sur GitHub inclut "data/"
        const URL_STATS = `https://api.github.com/repos/${USERNAME}/${REPO_NAME}/contents/data/stats.json`;
        const URL_LIKES = `https://api.github.com/repos/${USERNAME}/${REPO_NAME}/contents/data/likes.json`;
        const URL_HISTORIQUE = `https://api.github.com/repos/${USERNAME}/${REPO_NAME}/contents/data/historique.json`;

        const headers = {
            "Authorization": `token ${GITHUB_TOKEN}`,
            "Accept": "application/vnd.github.v3.raw" // Force GitHub à renvoyer le JSON pur au lieu du Base64
        };

        async function fetchGitHubFile(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) throw new Error(`Impossible de récupérer le fichier (${response.status})`);
            return await response.json();
        }

        async function chargerToutesLesDonnees() {
            const statusBox = document.getElementById("status-message");
            statusBox.innerText = "🔄 Récupération des données depuis GitHub...";
            statusBox.className = "mb-6 p-4 rounded-lg bg-yellow-950 border border-yellow-800 text-yellow-300 text-sm block";

            try {
                // Requêtes simultanées sur tes 3 fichiers JSON
                const [stats, likes, historique] = await Promise.all([
                    fetchGitHubFile(URL_STATS).catch(() => ({})),
                    fetchGitHubFile(URL_LIKES).catch(() => ({})),
                    fetchGitHubFile(URL_HISTORIQUE).catch(() => ({}))
                ]);

                afficherTopAuditeurs(stats);
                afficherHistorique(historique);
                afficherLikes(likes);

                statusBox.innerText = "✅ Données synchronisées avec succès !";
                statusBox.className = "mb-6 p-4 rounded-lg bg-green-950 border border-green-800 text-green-300 text-sm block";
                setTimeout(() => statusBox.className = "hidden", 3000);

            } catch (error) {
                console.error(error);
                statusBox.innerText = `❌ Erreur : ${error.message}. Vérifie ton Token, tes pseudos ou que le bot a bien push une première fois.`;
                statusBox.className = "mb-6 p-4 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm block";
            }
        }

        function afficherTopAuditeurs(stats) {
            const container = document.getElementById("top-auditeurs-list");
            container.innerHTML = "";

            const trie = Object.entries(stats).sort((a, b) => b[1].count - a[1].count);

            if (trie.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-sm italic">Aucune statistique enregistrée.</p>`;
                return;
            }

            trie.forEach(([id, data], index) => {
                const nom = data.display_name || data.username || "Inconnu";
                const medailles = { 0: "🥇", 1: "🥈", 2: "🥉" };
                const badge = medailles[index] || `<span class="text-gray-500 font-mono text-xs">#${index + 1}</span>`;

                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-900/50 p-3 rounded-xl border border-gray-800/60">
                        <div class="flex items-center gap-3">
                            <div class="w-6 text-center">${badge}</div>
                            <div>
                                <div class="font-semibold text-sm">${nom}</div>
                                <div class="text-gray-500 text-[11px] font-mono">${id}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="spotify-green font-bold text-sm">${data.count}</span>
                            <span class="text-gray-500 text-xs"> titres</span>
                        </div>
                    </div>
                `;
            });
        }

        function afficherHistorique(historique) {
            const container = document.getElementById("historique-list");
            container.innerHTML = "";

            // On fusionne toutes les écoutes de tout le monde pour faire un flux global
            let fluxGlobal = [];
            Object.values(historique).forEach(user => {
                if (user.ecoutes) {
                    user.ecoutes.forEach(e => {
                        fluxGlobal.push({ ...e, listener: user.display_name || user.username });
                    });
                }
            });

            // On trie par date décroissante (format "JJ/MM/AAAA HH:MM")
            fluxGlobal.sort((a, b) => {
                const parseDate = (dStr) => {
                    const [p1, p2] = dStr.split(" ");
                    const [j, m, a] = p1.split("/");
                    return new Date(`${a}-${m}-${j}T${p2}:00`);
                };
                return parseDate(b.date) - parseDate(a.date);
            });

            if (fluxGlobal.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-sm italic">Aucun historique disponible.</p>`;
                return;
            }

            fluxGlobal.slice(0, 20).forEach(track => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-900/30 p-3.5 rounded-xl border border-gray-800/40 hover:border-gray-700/60 transition">
                        <div>
                            <a href="${track.url}" target="_blank" class="font-semibold text-sm hover:text-[#1ed760] transition block max-w-xs md:max-w-md truncate">🎵 ${track.titre}</a>
                            <span class="text-xs text-gray-400">par <span class="text-gray-300 font-medium">${track.artiste}</span></span>
                        </div>
                        <div class="text-right shrink-0">
                            <div class="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded-md inline-block font-medium mb-1">🎧 ${track.listener}</div>
                            <div class="text-[11px] text-gray-500 font-mono">${track.date}</div>
                        </div>
                    </div>
                `;
            });
        }

        function afficherLikes(likes) {
            const container = document.getElementById("likes-container");
            container.innerHTML = "";

            const usersWithLikes = Object.entries(likes).filter(([id, data]) => data.liste && data.liste.length > 0);

            if (usersWithLikes.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-sm italic col-span-full">Aucun morceau liké sur le serveur pour le moment.</p>`;
                return;
            }

            usersWithLikes.forEach(([id, data]) => {
                const nom = data.display_name || data.username;
                let itemsHtml = "";
                
                data.liste.slice(-5).reverse().forEach(track => {
                    itemsHtml += `
                        <li class="text-xs py-1.5 border-b border-gray-800/40 last:border-none flex justify-between items-center gap-2">
                            <a href="${track.url}" target="_blank" class="hover:text-red-400 transition truncate font-medium block max-w-[180px]">${track.titre}</a>
                            <span class="text-gray-500 text-[11px] truncate shrink-0 italic">${track.artiste}</span>
                        </li>
                    `;
                });

                container.innerHTML += `
                    <div class="bg-gray-900/40 border border-gray-800 rounded-xl p-4">
                        <div class="flex justify-between items-center mb-3 border-b border-gray-800 pb-2">
                            <span class="font-bold text-sm text-gray-200">❤️ ${nom}</span>
                            <span class="text-xs bg-red-950/40 border border-red-900/60 text-red-400 font-bold px-2 py-0.5 rounded-full">${data.liste.length} favoris</span>
                        </div>
                        <ul>
                            ${itemsHtml}
                        </ul>
                    </div>
                `;
            });
        }

        // Chargement automatique au lancement de la page si les variables sont remplies
        if (GITHUB_TOKEN !== "METS_TON_TOKEN_GITHUB_ICI") {
            window.onload = chargerToutesLesDonnees;
        }
    </script>
</body>
</html>
