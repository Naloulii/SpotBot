<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotBot — Dashboard Live & Stats</title>
<link rel="icon" type="image/x-icon" href="spotbot-pdp-avatar.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&family=Inter:wght=400;500;600;700&family=JetBrains+Mono:wght=400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0b;
    --bg-raised:#121212;
    --bg-card:#181818;
    --bg-card-hover:#202020;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text:#ffffff;
    --text-dim:#b3b3b3;
    --text-faint:#727272;
    --green:#1ed760;
    --green-dim:#169c46;
    --green-glow:rgba(30,215,96,0.35);
    --pink:#ff4d8d;
    --blue:#3fb6ff;
    --radius-s:8px;
    --radius-m:14px;
    --radius-l:22px;
    --shadow-lift:0 18px 40px -18px rgba(0,0,0,0.75);
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(30,215,96,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(30,215,96,0.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
  }

  a{ color:inherit; }
  ::selection{ background:var(--green); color:#0b0b0b; }

  :focus-visible{
    outline:2px solid var(--green);
    outline-offset:3px;
    border-radius:4px;
  }

  button, input, select{ font-family:inherit; }

  /* ---------- Layout shells ---------- */
  .wrap{
    max-width:1160px;
    margin:0 auto;
    padding:0 24px 96px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:26px 24px 6px;
    max-width:1160px;
    margin:0 auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    letter-spacing:0.01em;
    text-decoration:none;
  }
  .brand small{
    display:block;
    font-family:var(--font-mono);
    font-size:10px;
    font-weight:500;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-top:2px;
  }

  /* ---------- Spot-mark (logo rond vert, identique à la PDP) ---------- */
  .spot-mark{
    --size:34px;
    width:var(--size); height:var(--size);
    flex-shrink:0;
    display:block;
  }
  .spot-mark.spin{ animation:spin 2.6s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .sync-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:9px 16px;
    background:var(--bg-card);
    color:var(--text-dim);
    border:1px solid var(--border-strong);
    border-radius:999px;
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
    white-space:nowrap;
  }
  .sync-btn:hover{ border-color:var(--green); color:var(--text); background:var(--bg-card-hover); }
  .sync-btn:disabled{ opacity:.7; cursor:default; }
  .spin-icon{ animation:spin 1s linear infinite; }
  @media (max-width:600px){
    .sync-label{ display:none; }
    .sync-btn{ padding:9px 11px; }
  }

  .loading-screen{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:130px 20px;
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:13px;
    letter-spacing:0.04em;
  }
  .loading-screen .spot-mark{ --size:56px; }

  /* ---------- Hero ---------- */
  .hero{
    padding:38px 0 44px;
    border-bottom:1px solid var(--border);
    margin-bottom:40px;
    position:relative;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='40'><rect width='4' height='40' fill='%23ffffff' opacity='0.02'/></svg>");
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--green);
    margin:0 0 16px;
  }
  .eyebrow::before{
    content:"";
    width:6px; height:6px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 10px var(--green-glow);
  }
  h1.hero-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(32px, 5vw, 52px);
    line-height:1.05;
    margin:0 0 16px;
    letter-spacing:-0.01em;
  }
  .hero-title em{
    font-style:normal;
    color:var(--green);
    text-shadow:0 0 24px var(--green-glow);
  }
  .hero-sub{
    font-size:15.5px;
    line-height:1.65;
    color:var(--text-dim);
    max-width:560px;
    margin:0;
  }

  /* ---------- Boutons Discord & d'invitation ---------- */
  .button-group{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:22px;
  }
  .discord-login-btn, .logout-btn, .invite-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:13px 22px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14.5px;
    border:none;
    border-radius:999px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
  }
  .discord-login-btn{
    background:#5865F2;
    color:#ffffff;
    box-shadow:0 10px 30px -14px rgba(88,101,242,0.7);
  }
  .discord-login-btn:hover{
    background:#4752c4;
    transform:translateY(-2px);
  }
  .invite-btn{
    background:var(--green);
    color:#ffffff; /* Forcé en blanc à la place du noir d'origine #0b0b0b */
    box-shadow:0 10px 30px -14px var(--green-glow);
  }
  .invite-btn:hover{
    background:#169c46;
    color:#ffffff; /* Assure que le texte reste blanc lors du survol */
    transform:translateY(-2px);
  }
  .logout-btn{
    background:transparent;
    color:var(--text-dim);
    border:1px solid var(--border-strong);
  }
  .logout-btn:hover{
    background:var(--bg-card-hover);
    color:var(--text);
  }
  .login-gate{ padding-bottom:60px; }

  /* ---------- Grille des serveurs ---------- */
  .crate-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:18px;
  }

  .sleeve{
    position:relative;
    background:var(--bg-card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:24px 20px 22px;
    cursor:pointer;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    text-align:center;
    transition:transform .25s cubic-bezier(.2,.8,.2,1), border-color .25s ease, background .25s ease;
  }
  .sleeve:hover, .sleeve:focus-visible{
    transform:translateY(-4px);
    border-color:var(--green);
    background:var(--bg-card-hover);
  }
  .sleeve-admin{
    border-color:rgba(255,215,0,0.35);
    background:linear-gradient(180deg, rgba(255,215,0,0.08), var(--bg-card));
  }
  .sleeve-admin:hover, .sleeve-admin:focus-visible{
    border-color:#ffd700;
  }
  .sleeve-admin .sleeve-label{
    background:var(--bg-raised);
    box-shadow:0 0 0 3px rgba(255,215,0,0.45);
    font-size:32px;
  }
  .sleeve-admin .sleeve-hint{ color:#ffd700; }
  .sleeve-label{
    width:84px; height:84px;
    border-radius:50%;
    background:var(--bg-raised);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    box-shadow:0 0 0 3px var(--border-strong);
    font-family:var(--font-display);
    font-weight:700;
    font-size:24px;
    color:var(--green);
  }
  .sleeve-label img{ width:100%; height:100%; object-fit:cover; }
  .sleeve-name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:17px;
    line-height:1.25;
  }
  .sleeve-hint{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--green-dim);
  }

  .empty-state, .error-state{
    grid-column:1/-1;
    border:1px dashed var(--border-strong);
    border-radius:var(--radius-m);
    padding:48px 28px;
    text-align:center;
    color:var(--text-dim);
  }
  .empty-state h3, .error-state h3{
    font-family:var(--font-display);
    font-weight:600;
    font-size:21px;
    color:var(--text);
    margin:0 0 10px;
  }

  /* ---------- Vue serveur ---------- */
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--text-dim);
    text-decoration:none;
    margin-bottom:28px;
    padding-top:24px;
  }
  .back-link:hover{ color:var(--green); }

  .record-header{
    display:flex;
    align-items:center;
    gap:22px;
    padding-bottom:30px;
    border-bottom:1px solid var(--border);
    margin-bottom:8px;
  }
  .record-disc{
    --size:96px;
    width:var(--size); height:var(--size);
    border-radius:50%;
    flex-shrink:0;
    background:var(--bg-raised);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 3px var(--border-strong), var(--shadow-lift);
    overflow:hidden;
  }
  .record-disc img{
    width:100%; height:100%;
    object-fit:cover;
  }
  .record-disc .letter{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    color:var(--green);
  }
  .record-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(24px, 3.2vw, 34px);
    margin:0 0 6px;
  }
  .record-meta{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:0.04em;
  }

  /* Onglets */
  .tabs{
    display:flex;
    gap:4px;
    margin:28px 0 30px;
    border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .tab-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:12px 18px;
    cursor:pointer;
    position:relative;
    white-space:nowrap;
  }
  .tab-btn .num{ color:var(--text-faint); margin-right:8px; }
  .tab-btn:hover{ color:var(--text); }
  .tab-btn.active{ color:var(--green); }
  .tab-btn.active .num{ color:var(--green); }
  .tab-btn.active::after{
    content:"";
    position:absolute;
    left:14px; right:14px; bottom:-1px;
    height:2px;
    background:var(--green);
    border-radius:2px;
    box-shadow:0 0 8px var(--green-glow);
  }

  .panel{ display:none; }
  .panel.active{ display:block; animation:fadeUp .35s ease; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ---------- Classement ---------- */
  .board-row{
    display:grid;
    grid-template-columns:34px 40px 1fr auto;
    align-items:center;
    gap:16px;
    padding:13px 4px;
    border-bottom:1px solid var(--border);
  }
  .board-rank{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-faint);
  }
  .board-rank.medal{ font-size:18px; }
  .avatar{
    width:40px; height:40px;
    border-radius:50%;
    object-fit:cover;
    background:var(--bg-card);
    flex-shrink:0;
  }
  .avatar-fallback{
    width:40px; height:40px;
    border-radius:50%;
    background:var(--bg-card);
    color:var(--green);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    flex-shrink:0;
  }
  .board-main{ min-width:0; }
  .board-name{
    font-weight:500;
    font-size:14.5px;
    margin-bottom:7px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .board-bar-track{
    height:6px;
    background:var(--bg-card);
    border-radius:4px;
    overflow:hidden;
  }
  .board-bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius:4px;
  }
  .board-count{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-dim);
    text-align:right;
    white-space:nowrap;
  }

  /* ---------- Contrôles (recherche / filtre / pagination) ---------- */
  .controls-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }
  .field{
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-s);
    color:var(--text);
    padding:10px 14px;
    font-size:13.5px;
  }
  .field::placeholder{ color:var(--text-faint); }
  .field:focus{ border-color:var(--green); }
  .field-search{ flex:1 1 220px; }
  .field-select{ flex:0 0 auto; min-width:160px; }

  .pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-top:26px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .page-btn{
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    color:var(--text);
    border-radius:var(--radius-s);
    padding:8px 14px;
    cursor:pointer;
    font-family:var(--font-mono);
    font-size:12px;
  }
  .page-btn:hover:not(:disabled){ border-color:var(--green); color:var(--green); }
  .page-btn:disabled{ opacity:0.35; cursor:not-allowed; }

  /* ---------- Lignes d'historique ---------- */
  .history-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:13px 4px;
    border-bottom:1px solid var(--border);
  }
  .thumb{
    width:46px; height:46px;
    border-radius:8px;
    object-fit:cover;
    background:var(--bg-card);
    flex-shrink:0;
  }
  .thumb-fallback{
    width:46px; height:46px;
    border-radius:8px;
    background:var(--bg-card);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-faint);
    flex-shrink:0;
    font-size:16px;
  }
  .history-main{ min-width:0; flex:1; }
  .history-title{
    font-weight:500;
    font-size:14.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .history-sub{
    font-size:12.5px;
    color:var(--text-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .history-who{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    margin-top:3px;
  }
  .history-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    flex-shrink:0;
  }
  .history-date{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
  }
  .status-pill{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.03em;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
  }
  .status-pill.full{ background:rgba(30,215,96,0.14); color:var(--green); border:1px solid rgba(30,215,96,0.35); }
  .status-pill.partial{ background:rgba(255,255,255,0.06); color:var(--text-dim); border:1px solid var(--border-strong); }
  .link-icon{
    color:var(--text-faint);
    display:inline-flex;
    padding-left:4px;
  }
  .link-icon:hover{ color:var(--green); }

  .like-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:var(--text-faint);
    background:transparent;
    border:none;
    cursor:pointer;
    padding:4px;
    margin-left:4px;
    border-radius:50%;
  }
  .like-btn.liked{ color:var(--pink); }

  .like-card-wrap{ position:relative; display:flex; }
  .like-card-wrap .like-card{ flex:1; }

  /* ---------- Favoris ---------- */
  .member-strip{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:10px;
    margin-bottom:26px;
  }
  .member-chip{
    display:flex;
    align-items:center;
    gap:9px;
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    border-radius:30px;
    padding:6px 14px 6px 6px;
    cursor:pointer;
    flex-shrink:0;
    font-size:13px;
  }
  .member-chip .avatar, .member-chip .avatar-fallback{ width:28px; height:28px; font-size:11px; }
  .member-chip.active{ border-color:var(--green); color:var(--green); }

  .likes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .like-card{
    background:var(--bg-card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:16px;
    display:flex;
    gap:12px;
    align-items:center;
    text-decoration:none;
    transition:border-color .2s ease, transform .2s ease;
  }
  .like-card:hover{ border-color:var(--green); transform:translateY(-2px); }
  .like-card .thumb, .like-card .thumb-fallback{ width:42px; height:42px; }
  .like-title{ font-weight:600; font-size:13.5px; line-height:1.3; }
  .like-artist{ font-size:12px; color:var(--text-dim); margin-top:2px; }

  .tab-empty{
    padding:60px 20px;
    text-align:center;
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:13px;
  }

  /* ---------- Onglet Tops ---------- */
  .tops-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
    gap:18px;
  }
  .tops-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .tops-card-head{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .tops-card-head .avatar, .tops-card-head .avatar-fallback{ width:44px; height:44px; font-size:15px; }
  .tops-name{ font-family:var(--font-display); font-weight:600; font-size:16px; }
  .tops-id{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); margin-top:2px; }

  .tops-columns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media (max-width:520px){ .tops-columns{ grid-template-columns:1fr; } }
  .tops-col{ min-width:0; }

  .tops-col-label{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:10px;
  }
  .tops-col-label .dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .tops-col-label.songs .dot{ background:var(--pink); box-shadow:0 0 8px rgba(255,77,141,0.5); }
  .tops-col-label.artists .dot{ background:var(--blue); box-shadow:0 0 8px rgba(63,182,255,0.5); }

  .tops-row{
    display:flex;
    align-items:center;
    gap:9px;
    padding:7px 0;
  }
  .tops-rank{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    width:14px;
    flex-shrink:0;
  }
  .tops-thumb{
    width:32px; height:32px;
    object-fit:cover;
    background:var(--bg-raised);
    flex-shrink:0;
  }
  .tops-thumb.song{ border-radius:6px; }

function getRedirectUri(){
  return window.location.origin + window.location.pathname;
}

function discordLoginUrl(){
  const state = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
  sessionStorage.setItem("discord_oauth_state", state);
  const params = new URLSearchParams({
    response_type: "token",
    client_id: DISCORD_CONFIG.CLIENT_ID,
    scope: DISCORD_CONFIG.SCOPE,
    redirect_uri: getRedirectUri(),
    state
  });
  return `https://discord.com/oauth2/authorize?${params.toString()}`;
}

function handleOAuthRedirect(){
  if(!location.hash.includes("access_token=")) return;

  const params = new URLSearchParams(location.hash.slice(1));
  const token = params.get("access_token");
  const expiresIn = parseInt(params.get("expires_in") || "0", 10);
  const state = params.get("state");
  const savedState = sessionStorage.getItem("discord_oauth_state");
  sessionStorage.removeItem("discord_oauth_state");

  history.replaceState(null, "", location.pathname + location.search + "#/");

  if(!token || !savedState || state !== savedState){
    return;
  }

  localStorage.setItem("discord_token", token);
  localStorage.setItem("discord_token_expiry", String(Date.now() + expiresIn * 1000));
}

function getStoredToken(){
  const token = localStorage.getItem("discord_token");
  const expiry = parseInt(localStorage.getItem("discord_token_expiry") || "0", 10);
  if(!token || !expiry || Date.now() > expiry) return null;
  return token;
}

function logoutDiscord(){
  localStorage.removeItem("discord_token");
  localStorage.removeItem("discord_token_expiry");
  localStorage.removeItem("discord_user_id");
  location.hash = "#/";
  route();
}

async function fetchDiscordUserId(token){
  const cached = localStorage.getItem("discord_user_id");
  if(cached) return cached;

  try{
    const res = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${token}` },
      cache: "no-store"
    });
    if(!res.ok){
      if(res.status === 401) logoutDiscord();
      return null;
    }
    const user = await res.json();
    localStorage.setItem("discord_user_id", user.id);
    return user.id;
  }catch(e){
    return null;
  }
}

  const token = getStoredToken();

    renderLoginGate();

  loadingScreen("Vérification de l'accès…");

        <p class="hero-sub"><a href="#/">← Retour à la liste de tes serveurs</a></p>
      </section>`;
    return;
  }

  let info = {};
  let memberIds = new Set();

  if(!isAllAccess){
    info = await fetchJSON(`${RAW_BASE}data/${guildId}/guild_info.json`, {});
    memberIds = new Set(info.member_ids || []);

    if(!ADMIN_IDS.includes(userId) && !memberIds.has(userId)){
      app.innerHTML = `
        <section class="hero">
          <p class="eyebrow">Accès refusé</p>
          <h1 class="hero-title">Tu n'es pas membre<br><em>de ce serveur.</em></h1>
          <p class="hero-sub"><a href="#/">← Retour à la liste de tes serveurs</a></p>
        </section>`;
      return;
    }
  }

  loadingScreen("Chargement des écoutes…");

  // On charge users.json (profils) et tracks.json (métadonnées chansons) à la racine de /data
  const [statsGlobal, likesGlobal, historiqueGlobal, artists, tracks, users] = await Promise.all([
    fetchJSON(`${RAW_BASE}data/stats.json`, {}),
    fetchJSON(`${RAW_BASE}data/likes.json`, {}),
    fetchJSON(`${RAW_BASE}data/historique.json`, {}),
    fetchJSON(`${RAW_BASE}data/artists.json`, {}),
    fetchJSON(`${RAW_BASE}data/tracks.json`, {}),
    fetchJSON(`${RAW_BASE}data/users.json`, {}) // <--- Profils centralisés !
  ]);

  const appartientAuServeur = ([uid]) => memberIds.has(uid);

  const stats = isAllAccess ? statsGlobal : Object.fromEntries(Object.entries(statsGlobal).filter(appartientAuServeur));
  const historique = isAllAccess ? historiqueGlobal : Object.fromEntries(Object.entries(historiqueGlobal).filter(appartientAuServeur));
  
  // Likes filtrés pour la liste locale
  const likes = Object.fromEntries(Object.entries(likesGlobal).filter(([uid]) => uid in historique));

  const guildName = isAllAccess ? "Accès total — Admin" : (info.name || `Serveur ${guildId}`);
  const discLabel = isAllAccess
    ? `<span class="letter">👑</span>`
    : (info.icon_url ? `<img src="${esc(info.icon_url)}" alt="">` : `<span class="letter">${initials(guildName)}</span>`);

  const memberCount = new Set([...Object.keys(stats), ...Object.keys(historique), ...Object.keys(likes)]).size;

  app.innerHTML = `
    <a class="back-link" href="#/">&larr; Retour aux serveurs</a>
    <header class="record-header">
      <span class="record-disc">${discLabel}</span>
      <div>
        <h1 class="record-title">${esc(guildName)}</h1>
        <p class="record-meta">${memberCount} auditeur${memberCount > 1 ? "s" : ""} suivis</p>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn ${initialTab==="classement"?"active":""}" data-tab="classement"><span class="num">01</span>Classement</button>
      <button class="tab-btn ${initialTab==="historique"?"active":""}" data-tab="historique"><span class="num">02</span>Historique</button>
      <button class="tab-btn ${initialTab==="favoris"?"active":""}" data-tab="favoris"><span class="num">03</span>Favoris</button>
      <button class="tab-btn ${initialTab==="tops"?"active":""}" data-tab="tops"><span class="num">04</span>Tops</button>
    </nav>

    <section class="panel ${initialTab==="classement"?"active":""}" id="panel-classement">${renderClassement(stats, users)}</section>
    <section class="panel ${initialTab==="historique"?"active":""}" id="panel-historique"></section>
    <section class="panel ${initialTab==="favoris"?"active":""}" id="panel-favoris"></section>
    <section class="panel ${initialTab==="tops"?"active":""}" id="panel-tops"></section>
  `;

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`panel-${btn.dataset.tab}`).classList.add("active");
      history.replaceState(null, "", `#/guild/${guildId}/${btn.dataset.tab}`);
    });
  });

  const monLikes = new Set(likesGlobal[userId] || []);
  mountHistorique(document.getElementById("panel-historique"), historique, artists, tracks, users, monLikes);
  mountFavoris(document.getElementById("panel-favoris"), likes, artists, tracks, users, userId);
  mountTops(document.getElementById("panel-tops"), historique, artists, tracks, users);
}

/* ---------- Onglet Classement ---------- */
function renderClassement(stats, users){
  const entries = Object.entries(stats).sort((a,b) => b[1] - a[1]);
  if(!entries.length){
    return `<div class="tab-empty">Aucun morceau validé cette semaine sur ce serveur. 🎧</div>`;
  }
  const max = entries[0][1] || 1;

  return entries.map(([uid, count], i) => {
    const prof = users[uid] || { username: "Inconnu", display_name: "Inconnu", avatar_url: null };
    const name = prof.display_name || prof.username || "Inconnu";
    return `
      <div class="board-row">
        <span class="board-rank ${i < 3 ? "medal" : ""}">${rankLabel(i)}</span>
        ${prof.avatar_url
          ? `<img class="avatar" src="${esc(prof.avatar_url)}" alt="" loading="lazy">`
          : `<span class="avatar-fallback">${initials(name)}</span>`}
        <div class="board-main">
          <div class="board-name">${esc(name)}</div>
          <div class="board-bar-track"><div class="board-bar-fill" style="width:${Math.max(4, (count/max)*100)}%"></div></div>
        </div>
        <span class="board-count">${count} titre${count>1?"s":""}</span>
      </div>
    `;
  }).join("");
}

/* ---------- Onglet Historique ---------- */
function mountHistorique(container, historique, artists, tracks, users, monLikes){
  const membres = Object.keys(historique).map(uid => {
    const prof = users[uid] || { username: "Inconnu", display_name: "Inconnu" };
    return { uid, name: prof.display_name || prof.username || "Inconnu" };
  });

  let toutes = [];
  for(const [uid, ecoutes] of Object.entries(historique)){
    const prof = users[uid] || { username: "Inconnu", display_name: "Inconnu" };
    const name = prof.display_name || prof.username || "Inconnu";
    for(const e of ecoutes){
      toutes.push({ ...e, uid, who: name });
    }
  }
  toutes.sort((a,b) => parseDateFR(b.date) - parseDateFR(a.date));

  let page = 1;
  let search = "";
  let filterUid = "";

  container.innerHTML = `
    <div class="controls-row">
      <input class="field field-search" type="search" placeholder="Rechercher un titre ou un artiste…" id="hist-search">
      <select class="field field-select" id="hist-member">
        <option value="">Tous les membres</option>
        ${membres.map(m => `<option value="${esc(m.uid)}">${esc(m.name)}</option>`).join("")}
      </select>
    </div>
    <div id="hist-list"></div>
    <div class="pagination" id="hist-pagination"></div>
  `;

  const listEl = container.querySelector("#hist-list");
  const pagEl = container.querySelector("#hist-pagination");

  function draw(){
    let filtered = toutes;
    if(filterUid) filtered = filtered.filter(e => e.uid === filterUid);
    
    if(search){
      const s = search.toLowerCase();
      filtered = filtered.filter(e => {
        const m = tracks[e.track_id];
        return m && ((m.titre || "").toLowerCase().includes(s) || (m.artiste || "").toLowerCase().includes(s));
      });
    }

    if(!filtered.length){
      listEl.innerHTML = `<div class="tab-empty">Aucune écoute ne correspond à ta recherche.</div>`;
      pagEl.innerHTML = "";
      return;
    }

    const totalPages = Math.max(1, Math.ceil(filtered.length / HIST_PER_PAGE));
    page = Math.min(page, totalPages);
    const start = (page-1)*HIST_PER_PAGE;
    const pageItems = filtered.slice(start, start+HIST_PER_PAGE);

    listEl.innerHTML = pageItems.map(e => historyRow(e, artists, tracks, monLikes)).join("");

    pagEl.innerHTML = `
      <button class="page-btn" id="hist-prev" ${page<=1?"disabled":""}>&larr; Précédent</button>
      <span>Page ${page} / ${totalPages} · ${filtered.length} écoute${filtered.length>1?"s":""}</span>
      <button class="page-btn" id="hist-next" ${page>=totalPages?"disabled":""}>Suivant &rarr;</button>
    `;
    const prevBtn = pagEl.querySelector("#hist-prev");
    const nextBtn = pagEl.querySelector("#hist-next");
    if(prevBtn) prevBtn.addEventListener("click", () => { page--; draw(); });
    if(nextBtn) nextBtn.addEventListener("click", () => { page++; draw(); });
  }

  container.querySelector("#hist-search").addEventListener("input", e => { search = e.target.value; page = 1; draw(); });
  container.querySelector("#hist-member").addEventListener("change", e => { filterUid = e.target.value; page = 1; draw(); });

  draw();
}

function trackThumb(coverUrl, artisteStr, artists, size = "thumb", fallbackToArtist = false){
  if(coverUrl){
    return `<img class="${size}" src="${esc(coverUrl)}" alt="" loading="lazy">`;
  }
  if(fallbackToArtist){
    const premierArtiste = (artisteStr || "").split(";")[0].trim().toLowerCase();
    const art = artists[premierArtiste];
    if(art && art.image_url){
      return `<img class="${size}" src="${esc(art.image_url)}" alt="" loading="lazy">`;
    }
  }
  return `<span class="${size}-fallback">🎵</span>`;
}

function historyRow(e, artists, tracks, monLikes){
  const m = tracks[e.track_id] || { titre: "Inconnu", artiste: "Inconnu", url: "", cover_url: null };
  const thumb = trackThumb(m.cover_url, m.artiste, artists);
  const isFull = (e.status || "").includes("🎉");
  const isLiked = monLikes ? monLikes.has(e.track_id) : false;

  return `
    <div class="history-row">
      ${thumb}
      <div class="history-main">
        <div class="history-title">${esc(m.titre)}</div>
        <div class="history-sub">${esc(m.artiste)}</div>
        <div class="history-who">${esc(e.who)}</div>
      </div>
      <div class="history-right">
        <span class="history-date">${esc(e.date)}</span>
        <span class="status-pill ${isFull ? "full" : "partial"}">${esc(e.status || "")}</span>
      </div>
      ${isLiked ? `<span class="like-btn liked" aria-label="Déjà liké">${iconHeartFilled()}</span>` : ""}
      ${m.url ? `<a class="link-icon" href="${esc(m.url)}" target="_blank" rel="noopener" aria-label="Ouvrir sur Spotify">${iconLink()}</a>` : ""}
    </div>`;
}

function parseDateFR(str){
  const m = /^(\d{2})\/(\d{2})\/(\d{4}) (\d{2}):(\d{2})$/.exec(str || "");
  if(!m) return 0;
  const [, d, mo, y, h, mi] = m;
  return new Date(`${y}-${mo}-${d}T${h}:${mi}:00`).getTime();
}

/* ---------- Onglet Favoris ---------- */
function mountFavoris(container, likes, artists, tracks, users, currentUserId){
  const membres = Object.entries(likes).filter(([,liste]) => liste && liste.length);

  if(!membres.length){
    container.innerHTML = `<div class="tab-empty">Personne n'a encore liké de morceau sur ce serveur. 🤍</div>`;
    return;
  }

  let active = membres[0][0];

  container.innerHTML = `
    <div class="member-strip">
      ${membres.map(([uid, liste]) => {
        const prof = users[uid] || { username: "Inconnu", display_name: "Inconnu", avatar_url: null };
        const name = prof.display_name || prof.username || "Inconnu";
        return `
          <div class="member-chip ${uid===active?"active":""}" data-uid="${esc(uid)}">
            ${prof.avatar_url
              ? `<img class="avatar" src="${esc(prof.avatar_url)}" alt="" loading="lazy">`
              : `<span class="avatar-fallback">${initials(name)}</span>`}
            <span>${esc(name)}</span>
          </div>
        `;
      }).join("")}
    </div>
    <div class="likes-grid" id="likes-grid"></div>
  `;

  const grid = container.querySelector("#likes-grid");
  const likesMap = Object.fromEntries(membres);

  function draw(uid){
    const listeIds = likesMap[uid] || [];

    grid.innerHTML = listeIds.map(trackId => {
      const m = tracks[trackId];
      if(!m) return "";

      const thumb = trackThumb(m.cover_url, m.artiste, artists);
      return `
        <div class="like-card-wrap" data-track-id="${esc(trackId)}">
          <a class="like-card" href="${esc(m.url)}" target="_blank" rel="noopener">
            ${thumb}
            <div>
              <div class="like-title">${esc(m.titre)}</div>
              <div class="like-artist">${esc(m.artiste)}</div>
            </div>
          </a>
        </div>`;
    }).join("");
  }

  container.querySelectorAll(".member-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      container.querySelectorAll(".member-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      draw(chip.dataset.uid);
    });
  });

  draw(active);
}

/* ---------- Onglet Tops ---------- */
function computeTops(historique, tracks, users){
  const membres = {};
  for(const [uid, ecoutes] of Object.entries(historique)){
    const songs = new Map();
    const artistesMap = new Map();

    for(const e of (ecoutes || [])){
      if(!(e.status || "").includes("🎉")) continue;

      const trackId = e.track_id;
      const m = tracks[trackId];
      if(!m) continue;

      if(!songs.has(trackId)){
        songs.set(trackId, { titre: m.titre, artiste: m.artiste, url: m.url, cover_url: m.cover_url || null, count: 0 });
      }
      songs.get(trackId).count++;

      for(const nom of (m.artiste || "").split(";").map(s => s.trim()).filter(Boolean)){
        const cle = nom.toLowerCase();
        if(!artistesMap.has(cle)) artistesMap.set(cle, { nom, count: 0 });
        artistesMap.get(cle).count++;
      }
    }

    const songsArr = [...songs.values()].sort((a,b) => b.count - a.count);
    const artistesArr = [...artistesMap.values()].sort((a,b) => b.count - a.count);

    if(songsArr.length || artistesArr.length){
      const prof = users[uid] || { username: "Inconnu", display_name: "Inconnu", avatar_url: null };
      membres[uid] = {
        uid,
        name: prof.display_name || prof.username || "Inconnu",
        avatar_url: prof.avatar_url || null,
        songs: songsArr,
        artistes: artistesArr
      };
    }
  }
  return membres;
}

function topsRow(i, titre, sousTitre, img, count, kind, artists){
  const size = "tops-thumb";
  let finalImg = img;
  
  if(!finalImg && kind === "song" && artists){
    const premierArtiste = (sousTitre || "").split(";")[0].trim().toLowerCase();
    finalImg = artists[premierArtiste]?.image_url || null;
  }
  const thumb = finalImg
    ? `<img class="${size} ${kind}" src="${esc(finalImg)}" alt="" loading="lazy">`
    : `<span class="${size}-fallback ${kind}">${kind === "song" ? "🎵" : "🎤"}</span>`;
    
  return `
    <div class="tops-row">
      <span class="tops-rank">${rankLabel(i)}</span>
      ${thumb}
      <div class="tops-row-main">
        <div class="tops-row-title">${esc(titre)}</div>
        <div class="tops-row-sub">${esc(sousTitre)}</div>
      </div>
      <span class="tops-row-count">${count}x</span>
    </div>`;
}

// Fonction globale d'icône de lien externe pour Spotify
function iconLink(){
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
}

function mountTops(container, historique, artists, tracks, users){
  const membresTops = computeTops(historique, tracks, users);
  const entries = Object.values(membresTops);

  if(!entries.length){
    container.innerHTML = `<div class="tab-empty">Pas encore assez d'écoutes validées pour calculer des tops. 🎧</div>`;
    return;
  }

  container.innerHTML = `<div class="tops-grid">${entries.map(m => topsCard(m, artists)).join("")}</div>`;

  container.querySelectorAll(".tops-full-btn").forEach(btn => {
    btn.addEventListener("click", () => openTopsModal(membresTops[btn.dataset.uid], artists));
  });
}

function topsCard(m, artists){
  const avatar = m.avatar_url
    ? `<img class="avatar" src="${esc(m.avatar_url)}" alt="" loading="lazy">`
    : `<span class="avatar-fallback">${initials(m.name)}</span>`;

  const top3Songs = m.songs.slice(0,3);
  const top3Artistes = m.artistes.slice(0,3);

  return `
    <div class="tops-card">
      <div class="tops-card-head">
        ${avatar}
        <div>
          <div class="tops-name">${esc(m.name)}</div>
          <div class="tops-id">${esc(m.uid)}</div>
        </div>
      </div>
      <div class="tops-columns">
        <div class="tops-col">
          <div class="tops-col-label songs"><span class="dot"></span>Top 3 chansons</div>
          ${top3Songs.length
            ? top3Songs.map((s,i) => topsRow(i, s.titre, s.artiste, s.cover_url, s.count, "song", artists))
            : `<div class="tops-mini-empty">Aucune chanson validée.</div>`}
        </div>
        <div class="tops-col">
          <div class="tops-col-label artists"><span class="dot"></span>Top 3 artistes</div>
          ${top3Artistes.length
            ? top3Artistes.map((a,i) => topsRow(i, a.nom, "Artiste", artists[a.nom.toLowerCase()]?.image_url, a.count, "artist", artists))
            : `<div class="tops-mini-empty">Aucun artiste validé.</div>`}
        </div>
      </div>
      <button class="tops-full-btn" data-uid="${esc(m.uid)}">📄 Voir le classement complet</button>
    </div>`;
}

function openTopsModal(membre, artists){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box" role="dialog" aria-modal="true" aria-label="Classement complet de ${esc(membre.name)}">
      <div class="modal-head">
        <h3>📄 Classement complet — ${esc(membre.name)}</h3>
        <button class="modal-close" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-columns">
        <div class="modal-col">
          <div class="tops-col-label songs modal-col-label"><span class="dot"></span>Toutes les chansons</div>
          <div class="modal-list">
            ${membre.songs.length
              ? membre.songs.map((s,i) => topsRow(i, s.titre, s.artiste, s.cover_url, s.count, "song", artists)).join("")
              : `<div class="tab-empty">Aucune chanson validée.</div>`}
          </div>
        </div>
        <div class="modal-col">
          <div class="tops-col-label artists modal-col-label"><span class="dot"></span>Tous les artistes</div>
          <div class="modal-list">
            ${membre.artistes.length
              ? membre.artistes.map((a,i) => topsRow(i, a.nom, "Artiste", artists[a.nom.toLowerCase()]?.image_url, a.count, "artist", artists)).join("")
              : `<div class="tab-empty">Aucun artiste validé.</div>`}
          </div>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";

  function close(){
    overlay.classList.remove("open");
    document.body.style.overflow = "";
    document.removeEventListener("keydown", onKey);
    setTimeout(() => overlay.remove(), 200);
  }
  function onKey(e){ if(e.key === "Escape") close(); }

  overlay.addEventListener("click", e => { if(e.target === overlay) close(); });
  overlay.querySelector(".modal-close").addEventListener("click", close);
  document.addEventListener("keydown", onKey);

  requestAnimationFrame(() => overlay.classList.add("open"));
}
</script>
