<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotBot Media Kit 680x240</title>
    <!-- Chargement de html2canvas pour la conversion en PNG propre -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0b0b0b;
            padding-top: 40px;
        }

        /* Barre d'onglets isolée tout en haut de la page */
        .nav-tabs {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .tab-btn {
            background: #191414;
            color: #aaaaaa;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-btn:hover, .tab-btn.active {
            border-color: #1ed760;
            color: #1ed760;
            background: #121212;
            box-shadow: 0 0 10px rgba(30, 215, 96, 0.2);
        }

        /* Conteneur principal fixe (680x240) avec fond capturable */
        .banner-container {
            position: relative;
            width: 680px;
            height: 240px;
            background-color: #121212;
            border: 2px solid #1ed760;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(30, 215, 96, 0.15);
        }

        /* Nouveau fond en barres SVG - 100% compatible avec le téléchargement image */
        .wave-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='240'><rect width='4' height='240' fill='%23ffffff' opacity='0.03'/></svg>");
            pointer-events: none;
            z-index: 1;
        }

        /* Système de pages internes */
        .page-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .page-wrapper.active {
            display: flex;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* Bouton de téléchargement */
        .download-btn {
            background: transparent;
            color: #1ed760;
            border: 2px solid #1ed760;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .download-btn:hover {
            background: #1ed760;
            color: #121212;
            box-shadow: 0 0 15px rgba(30, 215, 96, 0.4);
        }

        /* --- BANNIÈRE --- */
        .title {
            font-size: 48px;
            font-weight: 900;
            color: #1ed760;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(30, 215, 96, 0.4);
            margin-bottom: 2px;
        }

        .subtitle {
            font-size: 16px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.85;
        }

        .raw-link {
            font-size: 15px;
            font-weight: 700;
            color: #1ed760;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px rgba(30, 215, 96, 0.3);
        }

        /* --- LOGO / PDP --- */
        .pdp-wrapper {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .spotify-logo-custom {
            position: relative;
            width: 120px;
            height: 120px;
            background: #121212;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 3px #1ed760, inset 0 0 15px rgba(0,0,0,0.6);
        }

        .waves-container {
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transform: rotate(-10deg) translateY(-2px);
        }

        .wave {
            border: 6px solid transparent;
            border-top: 6px solid #1ed760;
            border-radius: 50%;
        }

        .wave-1 { width: 75px; height: 75px; }
        .wave-2 { width: 55px; height: 55px; border-top-color: #ffffff; }
        .wave-3 { width: 35px; height: 35px; }

        .pdp-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pdp-title {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
        }

        .pdp-title span {
            color: #1ed760;
        }

        .pdp-desc {
            font-size: 13px;
            color: #888888;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .bottom-stripe {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #1ed760;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Barre d'onglets isolée tout en haut de la page -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchPage('banner')">Bannière</button>
        <button class="tab-btn" onclick="switchPage('pdp')">PDP / Logo</button>
    </div>

    <!-- WRAPPER BANNIÈRE + BOUTON -->
    <div id="wrapper-banner" class="page-wrapper active">
        <div class="banner-container" id="capture-banner">
            <div class="wave-bg"></div>
            <div class="page">
                <h1 class="title">SpotBot</h1>
                <p class="subtitle">Dashboard Live & Stats</p>
                <a href="https://naloulii.github.io/SpotBot-data/" target="_blank" class="raw-link">
                    https://naloulii.github.io/SpotBot-data/
                </a>
            </div>
            <div class="bottom-stripe"></div>
        </div>
        <button class="download-btn" onclick="downloadPNG('capture-banner', 'spotbot-banner')">📥 Télécharger la Bannière (PNG)</button>
    </div>

    <!-- WRAPPER PDP + BOUTON -->
    <div id="wrapper-pdp" class="page-wrapper">
        <div class="banner-container" id="capture-pdp">
            <div class="wave-bg"></div>
            <div class="page">
                <div class="pdp-wrapper">
                    <div class="spotify-logo-custom">
                        <div class="waves-container">
                            <div class="wave wave-1"></div>
                            <div class="wave wave-2"></div>
                            <div class="wave wave-3"></div>
                        </div>
                    </div>
                    <div class="pdp-info">
                        <h2 class="pdp-title">Spot<span>Bot</span></h2>
                        <p class="pdp-desc">Official Avatar Style</p>
                    </div>
                </div>
            </div>
            <div class="bottom-stripe"></div>
        </div>
        <button class="download-btn" onclick="downloadPNG('capture-pdp', 'spotbot-pdp')">📥 Télécharger la PDP (PNG)</button>
    </div>

    <script>
        function switchPage(pageId) {
            document.querySelectorAll('.page-wrapper').forEach(wrapper => wrapper.classList.remove('active'));
            document.getElementById('wrapper-' + pageId).classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function downloadPNG(elementId, fileName) {
            const element = document.getElementById(elementId);
            
            html2canvas(element, {
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#121212',
                logging: false,
                scale: 2 // Haute qualité
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
